name: Auto Post

on:
  schedule:
    # 09:00 KST Monday, Thursday, Friday = 00:00 UTC on Mon, Thu, Fri
    - cron: '0 0 * * 1,4,5'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Post (09:00 KST Mon, Thu, Fri)
        run: |
          set -o pipefail
          node index.js post 2>&1 | tee post.log
        env:
          USER_ID: ${{ secrets.USER_ID || vars.USER_ID }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD || vars.USER_PASSWORD }}
          SITE_URL: https://green-office.uk/

      - name: Create Issue on Post Failure
        if: failure()
        run: |
          KST_TIME=$(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M")
          TITLE="📝 자동 포스팅 실패 ($KST_TIME)"
          
          echo "### ⚠️ 자동 포스팅 실패" > issue_body.md
          echo "- **실행 시간 (KST):** $KST_TIME" >> issue_body.md
          echo "- **실패 원인:** 포스팅 페이지 접근, 카테고리 선택, 또는 글 작성 중 에러가 발생했습니다." >> issue_body.md
          echo "" >> issue_body.md
          echo "#### 📋 상세 실행 로그:" >> issue_body.md
          echo "\`\`\`text" >> issue_body.md
          if [ -f post.log ]; then
            cat post.log >> issue_body.md
          else
            echo "로그 파일을 찾을 수 없습니다." >> issue_body.md
          fi
          echo "\`\`\`" >> issue_body.md
          
          gh issue create --title "$TITLE" --body-file issue_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
